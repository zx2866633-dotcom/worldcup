        <div class="bg-yellow-50 p-4 rounded border border-yellow-300 mb-4">
            <h3 class="font-bold text-yellow-800 mb-2">⚡ 새 경기 핸디캡 개별 설정</h3>

        <div class="bg-white p-4 rounded border mb-4">

        <div class="bg-white p-4 rounded border mb-6">

        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tdgcuozhvuyggktdjrry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkZ2N1b3podnV5Z2drdGRqcnJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzA2NTgsImV4cCI6MjA5NzIwNjY1OH0.TV08rACNlnetiWJFGYZOpFc89NSpe_52dS-Zwpuy8tU';
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASSWORD = "1234";
        const players = ['박형철', '와대', '손호민', '최석훈'];
        let currentUser = localStorage.getItem('worldcupUser') || '';

        const teamDictionary = {
            "South Korea": "🇰🇷 대한민국", "Korea Republic": "🇰🇷 대한민국",
            "Japan": "🇯🇵 일본", "United States": "🇺🇸 미국", "USA": "🇺🇸 미국",
            "Mexico": "🇲🇽 멕시코", "Canada": "🇨🇦 캐나다", "Brazil": "🇧🇷 브라질",
            "Argentina": "🇦🇷 아르헨티나", "France": "🇫🇷 프랑스", "England": "🏴󠁧󠁢󠁥󠁮󠁧󠁿 잉글랜드",

            "Ghana": "🇬🇭 가나", "Cameroon": "🇨🇲 카메룬", "Saudi Arabia": "🇸🇦 사우디",

            "Poland": "🇵🇱 폴란드", "Denmark": "🇩🇰 덴마크", "Tunisia": "🇹🇳 튀니지",
            "Switzerland": "🇨🇭 스위스", "Serbia": "🇷🇸 세르비아", "Ecuador": "🇪🇨 에콰도르",
            "Qatar": "🇶🇦 카타르"
        };

        function init() { if (currentUser) document.getElementById('current-user').value = currentUser; loadData(); }
        function saveUser() { currentUser = document.getElementById('current-user').value; localStorage.setItem('worldcupUser', currentUser); loadData(); }

        function checkAuth() {
            if (sessionStorage.getItem('isAdmin') === 'true') return true;
            const input = prompt("방장 비밀번호:");
            if (input === ADMIN_PASSWORD) { sessionStorage.setItem('isAdmin', 'true'); return true; }
            alert("비밀번호 틀림."); return false;
        }

        function handleAdminAction(action, ...args) {
            if(action !== 'show_menu' && !checkAuth()) return;
            if(action === 'show_menu') document.getElementById('admin-menu').classList.remove('hidden');
            if(action === 'create') createMatch();
            if(action === 'finish') finishMatch(args[0]);
            if(action === 'paid') markAsPaid(args[0]);
            if(action === 'close') closeBetting(args[0]);
            if(action === 'sync') syncWorldCup();
            if(action === 'set_handi') updateHandicap(args[0]);
            if(action === 'reset') resetAllMatches();
        }

        function logoutAdmin() { sessionStorage.removeItem('isAdmin'); document.getElementById('admin-menu').classList.add('hidden'); }

        async function syncWorldCup() {
            try {
                const response = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard');
                const data = await response.json();
                const { data: dbMatches } = await client.from('matches').select('*');
                let newCount = 0, updateCount = 0;

                for (const event of data.events) {
                    const comp = event.competitions[0];
                    const home = comp.competitors.find(c => c.homeAway === 'home');
                    const away = comp.competitors.find(c => c.homeAway === 'away');
                    
                    const teamA = teamDictionary[home.team.name] || home.team.name;
                    const teamB = teamDictionary[away.team.name] || away.team.name;
                    const scoreA = parseInt(home.score) || 0;
                    const scoreB = parseInt(away.score) || 0;
                    const isFinished = event.status.type.state === 'post' || event.status.type.completed;
                    const existingMatch = dbMatches.find(m => m.team_a === teamA && m.team_b === teamB);

                    if (existingMatch) {
                        if (isFinished && existingMatch.status !== 'finished' && existingMatch.status !== 'paid') {
                            await client.from('matches').update({ score_a: scoreA, score_b: scoreB, status: 'finished' }).match({ id: existingMatch.id });
                            updateCount++;
                        }
                    } else {
                        let initialStatus = isFinished ? 'finished' : 'open';
                        await client.from('matches').insert({
                            team_a: teamA, team_b: teamB, handicap: 0, status: initialStatus, score_a: scoreA, score_b: scoreB, created_at: event.date
                        });
                        newCount++;
                    }
                }
                alert("🌐 동기화 완료\\n새로운 경기: " + newCount + "건\\n자동 정산: " + updateCount + "건");
                loadData();
            } catch(e) { alert("동기화 오류: API 상태 확인 필요"); console.error(e); }
        }

        async function updateHandicap(id) {
            const h = parseFloat(document.getElementById(`h-${id}`).value);
            if(isNaN(h)) return alert("정확한 숫자를 입력하세요.");
            await client.from('matches').update({ handicap: h }).match({ id: id });
            loadData();
        }

        async function loadData() {
            try {
                const { data: matches } = await client.from('matches').select('*').order('created_at', { ascending: true });
                const { data: bets } = await client.from('bets').select('*');
                const statusOrder = { 'open': 1, 'closed': 2, 'finished': 3, 'paid': 4 };
                matches.sort((a, b) => statusOrder[a.status] - statusOrder[b.status]);

                renderMatches(matches || [], bets || []);
                calculateLeaderboard(matches || [], bets || []);
                renderAdminList(matches || []);
            } catch (err) { console.error(err); }
        }

        function renderAdminList(matches) {
            const resultList = document.getElementById('admin-result-list');
            const handicapList = document.getElementById('admin-handicap-list');
            
            const openMatches = matches.filter(m => m.status === 'open' || m.status === 'closed');
            resultList.innerHTML = openMatches.length ? openMatches.map(m => `
                <div class="flex items-center gap-1 bg-gray-50 p-2 rounded">
                    <span class="flex-grow font-bold truncate text-xs">${m.team_a} vs ${m.team_b}</span>
                    <input type="number" id="sA-${m.id}" class="w-8 border p-1 rounded text-center" placeholder="A">
                    <input type="number" id="sB-${m.id}" class="w-8 border p-1 rounded text-center" placeholder="B">
                    <button onclick="handleAdminAction('finish', ${m.id})" class="bg-gray-800 text-white px-2 py-1 rounded">확정</button>
                    <button onclick="handleAdminAction('close', ${m.id})" class="bg-yellow-600 text-white px-2 py-1 rounded">마감</button>
                </div>`).join('') : '<p class="text-xs text-center text-gray-500">정산/마감할 경기 없음</p>';

            if(handicapList) {
                const needsHandicap = matches.filter(m => (m.status === 'open' || m.status === 'closed') && m.handicap === 0);
                handicapList.innerHTML = needsHandicap.length ? needsHandicap.map(m => `
                    <div class="flex items-center gap-1 bg-white p-2 rounded border border-yellow-200 shadow-sm">
                        <span class="flex-grow font-bold truncate text-xs text-yellow-900">${m.team_a} vs ${m.team_b}</span>
                        <input type="text" id="h-${m.id}" class="w-16 border border-yellow-400 p-1 rounded text-center text-sm" placeholder="핸디" value="0">
                        <button onclick="handleAdminAction('set_handi', ${m.id})" class="bg-green-600 text-white px-2 py-1 rounded text-xs font-bold">저장</button>
                    </div>`).join('') : '<p class="text-xs text-center text-gray-500">핸디캡을 설정할 새 경기가 없습니다.</p>';
            }
        }

        function renderMatches(matches, bets) {
            const container = document.getElementById('matches-list');
            container.innerHTML = '';
            matches.forEach(match => {
                const matchBets = bets.filter(b => b.match_id === match.id);
                const myBet = matchBets.find(b => b.player_name === currentUser);
                let betStatusText = players.map(p => {
                    const b = matchBets.find(x => x.player_name === p);
                    const tName = b ? (b.pick === 'A' ? match.team_a : match.team_b) : '-';
                    return b ? `<span class="font-bold ${b.pick === 'A'?'text-blue-600':'text-red-600'}">${p}(${tName})</span>` : `<span class="text-gray-400">${p}(-)</span>`;
                }).join(' / ');

                if (match.status === 'paid') {
                    const sA=Number(match.score_a), sB=Number(match.score_b), h=Number(match.handicap);
                    const adjA = sA + h;
                    let winner = (adjA > sB) ? 'A' : (adjA < sB) ? 'B' : 'D';
                    let losers = winner !== 'D' ? players.filter(p => matchBets.find(b => b.player_name === p)?.pick !== winner) : [];
                    let penaltyText = winner === 'D' ? '무승부' : (losers.length > 0 ? `💸 성의: ${losers.join(', ')}` : '🎉 전원 정답');

                    container.insertAdjacentHTML('beforeend', `
                        <div class="bg-gray-200 border border-gray-300 rounded p-2 flex justify-between items-center text-xs shadow-inner mb-2">
                            <div>
                                <span class="font-bold text-gray-500">[수금완료]</span> ${match.team_a} ${sA}:${sB} ${match.team_b} 
                                <span class="ml-2 text-red-600 font-bold">${penaltyText}</span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="editBetsAdmin(${match.id})" class="text-[10px] bg-purple-200 text-purple-800 px-2 py-1 rounded">✏️픽수정</button>
                                <button onclick="deleteMatch(${match.id})" class="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded">🗑️</button>
                            </div>
                        </div>
                    `);
                    return;
                }

                if (match.status === 'finished') {
                    const sA=Number(match.score_a), sB=Number(match.score_b), h=Number(match.handicap);
                    const adjA = sA + h;
                    let winner = (adjA > sB) ? 'A' : (adjA < sB) ? 'B' : 'D';
                    let winnerText = winner === 'A' ? match.team_a : winner === 'B' ? match.team_b : '무승부';
                    
                    let losers = [];
                    if(winner !== 'D') {
                        players.forEach(p => {
                            const b = matchBets.find(x => x.player_name === p);
                            if(!b || b.pick !== winner) losers.push(p);
                        });
                    }
                    let penaltyText = winner === 'D' ? '무승부 (금액 없음)' : (losers.length > 0 ? `💸 성의 표시 대상자: ${losers.join(', ')}` : '🎉 전원 정답!');

                    container.insertAdjacentHTML('beforeend', `
                    <div class="border-2 border-gray-400 bg-gray-100 rounded-xl p-5 relative shadow-sm mb-4 opacity-90">
                        <span class="absolute -top-3 left-4 bg-gray-700 text-white px-2 py-1 rounded text-xs shadow">ID: ${match.id} (정산완료)</span>
                        <div class="absolute top-2 right-4 flex gap-1 items-center">
                            <button onclick="handleAdminAction('paid', ${match.id})" class="text-xs font-bold bg-green-200 text-green-800 px-2 py-1 rounded">💰수금완료</button>
                            <button onclick="editBetsAdmin(${match.id})" class="text-xs bg-purple-200 text-purple-800 px-2 py-1 rounded">✏️픽수정</button>
                            <button onclick="deleteMatch(${match.id})" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded">🗑️</button>
                        </div>
                        <div class="text-center mb-2 mt-4">
                            <span class="text-xl font-black text-gray-800">${match.team_a}</span> vs <span class="text-xl font-black text-gray-800">${match.team_b}</span>
                            <p class="text-xs text-blue-600 font-bold mt-1">핸디캡(A): ${match.handicap}</p>
                        </div>
                        <div class="bg-gray-800 text-white rounded text-sm p-3 text-center mb-2">
                            <p class="font-bold">최종 스코어: ${sA} : ${sB} (핸디캡 결과: ${winnerText})</p>
                            <p class="text-yellow-400 font-bold mt-1">${penaltyText}</p>
                        </div>
                        <div class="text-xs text-center bg-white border p-2 rounded">베팅 기록: ${betStatusText}</div>
                    </div>`);
                    return;
                }

                let cardHTML = `
                <div class="border-2 border-blue-300 bg-white rounded-xl p-5 relative shadow-sm mb-4">
                    <span class="absolute -top-3 left-4 bg-gray-700 text-white px-2 py-1 rounded text-xs shadow">ID: ${match.id}</span>
                    <div class="absolute top-2 right-4 flex gap-1 items-center">
                        <button onclick="editMatch(${match.id}, '${match.team_a}', '${match.team_b}', ${match.handicap})" class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded">✏️경기수정</button>
                        <button onclick="deleteMatch(${match.id})" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded">🗑️</button>
                    </div>
                    <div class="text-center mb-4 mt-2">
                        <span class="text-xl font-black text-gray-800">${match.team_a}</span> vs <span class="text-xl font-black text-gray-800">${match.team_b}</span>
                        <p class="text-xs text-blue-600 font-bold mt-1">핸디캡(A): ${match.handicap}</p>
                    </div>
                    <div class="flex gap-2 mb-3">
                        <button onclick="placeBet(${match.id}, 'A')" class="${myBet?.pick === 'A'?'bg-blue-600 text-white':'bg-gray-200'} w-1/2 py-2 rounded font-bold">${match.team_a} 승</button>
                        <button onclick="placeBet(${match.id}, 'B')" class="${myBet?.pick === 'B'?'bg-red-600 text-white':'bg-gray-200'} w-1/2 py-2 rounded font-bold">${match.team_b} 승</button>
                    </div>
                    <div class="text-xs text-center mt-2 p-2 bg-gray-100 rounded">현재 베팅: ${betStatusText}</div>
                </div>`;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function calculateLeaderboard(matches, bets) {
            const settledMatches = matches.filter(m => m.status === 'finished' || m.status === 'paid');
            let misses = { '박형철': 0, '와대': 0, '손호민': 0, '최석훈': 0 };
            
            settledMatches.forEach(match => {
                const adjA = Number(match.score_a) + Number(match.handicap);
                let winner = (adjA > Number(match.score_b)) ? 'A' : (adjA < Number(match.score_b)) ? 'B' : 'D';
                if(winner !== 'D') {
                    players.forEach(p => {
                        const bet = bets.find(b => b.match_id === match.id && b.player_name === p);
                        if (!bet || bet.pick !== winner) misses[p]++; 
                    });
                }
            });
            const sorted = Object.entries(misses).sort((a,b) => b[1]-a[1]);
            document.getElementById('leaderboard').innerHTML = sorted.map(([n, c]) => 
                `<li class="flex justify-between bg-gray-700 p-2 rounded"><span>👤 ${n}</span><span class="${c>0?'text-red-400':'text-green-400'} font-bold">${(c * 1500).toLocaleString()}원 (${c}회)</span></li>`).join('');
        }

        async function placeBet(matchId, pick) {
            if (!currentUser) return alert('맨 위에서 이름을 먼저 선택해주세요!');
            
            const { data: m } = await client.from('matches').select('status').eq('id', matchId).single();
            if(m.status !== 'open') return alert('베팅이 마감된 경기입니다!');
            
            const { data: existingBet } = await client.from('bets').select('*').eq('match_id', matchId).eq('player_name', currentUser);
            if (existingBet && existingBet.length > 0) return alert('⚠️ 낙장불입! 한 번 선택한 베팅은 변경할 수 없습니다.\\n잘못 누른 경우 방장에게 수정을 요청하세요.');

            await client.from('bets').insert({ match_id: matchId, player_name: currentUser, pick: pick });
            loadData();
        }

        async function closeBetting(id) { await client.from('matches').update({ status: 'closed' }).match({ id: id }); loadData(); }
        async function markAsPaid(id) { await client.from('matches').update({ status: 'paid' }).match({ id: id }); loadData(); }
        async function finishMatch(id) {
            const sA = document.getElementById(`scoreA-${id}`).value, sB = document.getElementById(`scoreB-${id}`).value;
            if(!sA || !sB) return alert("점수 입력 필수!");
            await client.from('matches').update({ score_a: sA, score_b: sB, status: 'finished' }).match({ id: id });
            loadData();
        }

        async function createMatch() {
            const tA = document.getElementById('new-teamA').value, tB = document.getElementById('new-teamB').value, h = parseFloat(document.getElementById('new-handi').value);
            if(!tA || !tB || isNaN(h)) return alert("국가명과 핸디캡을 정확히 입력하세요.");
            await client.from('matches').insert({ team_a: tA, team_b: tB, handicap: h, status: 'open', created_at: new Date() });
            loadData();
        }

        async function resetAllMatches() {
            if(!confirm("⚠️ 모든 기록을 초기화하시겠습니까? 복구할 수 없습니다.")) return;
            await client.from('bets').delete().neq('id', 0);
            await client.from('matches').delete().neq('id', 0);
            loadData();
        }

        async function editMatch(id, a, b, h) {
            if(!checkAuth()) return;
            const nA = prompt("팀A 수정:", a), nB = prompt("팀B 수정:", b), nH = prompt("핸디:", h);
            if(nA && nB) await client.from('matches').update({ team_a: nA, team_b: nB, handicap: parseFloat(nH) }).match({ id: id });
            loadData();
        }

        async function editBetsAdmin(matchId) {
            if(!checkAuth()) return;
            const input = prompt("박형철, 와대, 손호민, 최석훈 님의 베팅을 쉼표(,)로 구분해서 입력하세요.\\n(A: 팀A, B: 팀B, X: 베팅안함)\\n\\n예시: A, B, A, X");
            if(!input) return;
            
            const picks = input.split(',').map(s => s.trim().toUpperCase());
            if(picks.length !== 4) return alert("4명의 픽을 쉼표로 정확히 4개 입력해주세요.");

            await client.from('bets').delete().match({ match_id: matchId });
            for(let i=0; i<4; i++) {
                if(picks[i] === 'A' || picks[i] === 'B') await client.from('bets').insert({ match_id: matchId, player_name: players[i], pick: picks[i] });
            }
            alert("베팅 기록이 수정되었습니다.");
            loadData();
        }
        
        async function deleteMatch(id) {
            if(!checkAuth()) return;
            if(!confirm("삭제하시겠습니까?")) return;
            await client.from('bets').delete().match({ match_id: id });
            await client.from('matches').delete().match({ id: id });
            loadData();
        }

        window.onload = init;
    </script>
</body>
</html>
