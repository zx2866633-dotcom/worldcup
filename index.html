<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월드컵 4인 실시간 내기방</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden p-6 mb-8">
        <h1 class="text-3xl font-extrabold text-center text-blue-600 mb-2">⚽ 실시간 4인 내기방</h1>
        
        <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-200">
            <label class="block text-sm font-bold text-gray-700 mb-2">👋 나는 누구인가요? (대리 베팅 가능)</label>
            <select id="current-user" onchange="saveUser()" class="w-full border-2 border-blue-300 rounded p-3 text-lg font-bold bg-white">
                <option value="" disabled selected>이름을 선택하세요</option>
                <option value="박형철">박형철</option>
                <option value="와대">와대</option>
                <option value="손호민">손호민</option>
                <option value="최석훈">최석훈</option>
            </select>
        </div>

        <div class="bg-gray-800 p-4 rounded-lg mb-6 shadow-inner text-white">
            <h3 class="text-lg font-bold text-red-400 mb-3 border-b border-gray-600 pb-2">💸 현재 누적 벌금 (오답 횟수)</h3>
            <ul id="leaderboard" class="space-y-2 text-gray-200 text-sm md:text-base">
                <li class="text-gray-400 text-center">결과가 정산된 경기가 없습니다.</li>
            </ul>
        </div>

        <div>
            <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">📋 경기 목록 및 베팅하기</h3>
            <div id="matches-list" class="space-y-6">
                <p class="text-center text-gray-500 font-bold">데이터를 불러오는 중입니다...</p>
            </div>
        </div>
    </div>

    <div class="max-w-3xl mx-auto text-center mb-8">
        <button onclick="handleAdminAction('show_menu')" class="bg-gray-700 text-white px-6 py-2 rounded-full font-bold hover:bg-black transition">👑 관리자 모드 접속</button>
    </div>

    <div id="admin-menu" class="max-w-3xl mx-auto bg-red-50 rounded-xl shadow-lg overflow-hidden p-6 border-2 border-red-200 hidden">
        <h2 class="text-xl font-extrabold text-red-600 mb-4">👑 방장 전용 관리 메뉴</h2>
        
        <div class="bg-white p-4 rounded border mb-4">
            <h3 class="font-bold text-gray-700 mb-2">1. 새로운 경기 등록</h3>
            <div class="flex flex-wrap gap-2 items-center mb-2">
                <input type="text" id="new-teamA" class="w-24 border rounded p-2 text-sm" placeholder="국가A">
                <span class="font-bold">VS</span>
                <input type="text" id="new-teamB" class="w-24 border rounded p-2 text-sm" placeholder="국가B">
                <input type="number" id="new-handi" class="w-16 border rounded p-2 text-sm" placeholder="핸디" step="0.5" value="2.5">
            </div>
            <div class="flex gap-2 items-center">
                <input type="datetime-local" id="new-date" class="border rounded p-2 text-sm text-gray-600 flex-grow">
                <button onclick="handleAdminAction('create')" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 text-sm whitespace-nowrap">경기 열기</button>
            </div>
        </div>

        <div class="bg-white p-4 rounded border mb-6">
            <h3 class="font-bold text-gray-700 mb-2">2. 진행 중인 경기 결과 입력</h3>
            <div id="admin-result-list" class="space-y-2 text-sm">
                <p class="text-gray-500 text-center">진행 중인 경기가 없습니다.</p>
            </div>
        </div>

        <div class="bg-red-100 p-4 rounded border border-red-300">
            <button onclick="handleAdminAction('reset')" class="w-full bg-red-600 text-white px-4 py-2 rounded font-bold hover:bg-red-700 transition text-sm">모든 데이터 초기화</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tdgcuozhvuyggktdjrry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkZ2N1b3podnV5Z2drdGRqcnJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzA2NTgsImV4cCI6MjA5NzIwNjY1OH0.TV08rACNlnetiWJFGYZOpFc89NSpe_52dS-Zwpuy8tU';
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASSWORD = "1234";
        const players = ['박형철', '와대', '손호민', '최석훈'];
        let currentUser = localStorage.getItem('worldcupUser') || '';

        function checkAuth() {
            if (sessionStorage.getItem('isAdmin') === 'true') return true;
            const input = prompt("방장 비밀번호:");
            if (input === ADMIN_PASSWORD) {
                sessionStorage.setItem('isAdmin', 'true');
                return true;
            }
            alert("비밀번호가 틀렸습니다.");
            return false;
        }

        function handleAdminAction(action, ...args) {
            if(!checkAuth()) return;
            if(action === 'show_menu') document.getElementById('admin-menu').classList.remove('hidden');
            if(action === 'create') createMatch();
            if(action === 'finish') finishMatch(...args);
            if(action === 'reset') resetAllMatches();
        }

        function renderAdminResults(matches) {
            const list = document.getElementById('admin-result-list');
            const activeMatches = matches.filter(m => m.status !== 'finished');
            if(activeMatches.length === 0) { list.innerHTML = '<p class="text-gray-500 text-center">진행 중인 경기가 없습니다.</p>'; return; }
            list.innerHTML = activeMatches.map(m => `
                <div class="flex items-center gap-1 bg-gray-50 p-2 rounded">
                    <span class="flex-grow font-bold truncate text-xs">${m.team_a} vs ${m.team_b}</span>
                    <input type="number" id="scoreA-${m.id}" class="w-10 border p-1 rounded text-center" placeholder="A">
                    <span>:</span>
                    <input type="number" id="scoreB-${m.id}" class="w-10 border p-1 rounded text-center" placeholder="B">
                    <button onclick="handleAdminAction('finish', ${m.id})" class="bg-gray-800 text-white px-2 py-1 rounded">확정</button>
                </div>
            `).join('');
        }

        async function loadData() {
            try {
                const { data: matches } = await client.from('matches').select('*');
                const { data: bets } = await client.from('bets').select('*');
                
                // ✅ 핵심 정렬 로직: 진행중(open/closed) 위로, 완료(finished) 아래로
                const sortedMatches = (matches || []).sort((a, b) => {
                    const statusOrder = { 'open': 0, 'closed': 1, 'finished': 2 };
                    if (statusOrder[a.status] !== statusOrder[b.status]) return statusOrder[a.status] - statusOrder[b.status];
                    return new Date(b.created_at) - new Date(a.created_at);
                });

                renderMatches(sortedMatches, bets || []);
                calculateLeaderboard(sortedMatches, bets || []);
                renderAdminResults(matches || []);
            } catch (err) { console.error(err); }
        }

        // 베팅 정보 텍스트 함수
        function getBetText(match, bets) {
            const matchBets = bets.filter(b => b.match_id === match.id);
            return players.map(p => {
                const b = matchBets.find(x => x.player_name === p);
                const tName = b ? (b.pick === 'A' ? match.team_a : match.team_b) : '-';
                return b ? `<span class="font-bold ${b.pick === 'A'?'text-blue-600':'text-red-600'}">${p}(${tName})</span>` : `<span class="text-gray-400">${p}(-)</span>`;
            }).join(' / ');
        }

        function renderMatches(matches, bets) {
            const container = document.getElementById('matches-list');
            container.innerHTML = '';
            matches.forEach(match => {
                const matchBets = bets.filter(b => b.match_id === match.id);
                const myBet = matchBets.find(b => b.player_name === currentUser);
                const betStatusText = getBetText(match, bets);
                const matchDate = formatDate(match.created_at);
                
                let cardHTML = `
                <div class="border-2 ${match.status === 'finished'?'border-gray-300 bg-gray-100':'border-blue-300 bg-white'} rounded-xl p-5 relative shadow-sm mb-4">
                    <span class="absolute -top-3 left-4 bg-gray-700 text-white px-2 py-1 rounded text-xs shadow">ID: ${match.id}</span>
                    <div class="absolute top-2 right-4 flex gap-1 items-center">
                        <button onclick="editMatch(${match.id}, '${match.team_a}', '${match.team_b}', ${match.handicap})" class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded">✏️</button>
                        <button onclick="deleteMatch(${match.id})" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded">🗑️</button>
                    </div>
                    <div class="text-center mb-4 mt-2">
                        <span class="text-xl font-black text-gray-800">${match.team_a}</span> vs <span class="text-xl font-black text-gray-800">${match.team_b}</span>
                        <p class="text-xs text-blue-600 font-bold mt-1">핸디캡(A): ${match.handicap}</p>
                    </div>
                `;

                if (match.status === 'open') {
                    cardHTML += `
                    <div class="flex gap-2 mb-3">
                        <button onclick="placeBet(${match.id}, 'A')" class="${myBet?.pick === 'A'?'bg-blue-600 text-white':'bg-gray-200'} w-1/2 py-2 rounded font-bold">${match.team_a} 승</button>
                        <button onclick="placeBet(${match.id}, 'B')" class="${myBet?.pick === 'B'?'bg-red-600 text-white':'bg-gray-200'} w-1/2 py-2 rounded font-bold">${match.team_b} 승</button>
                    </div>
                    <div class="text-xs text-center mt-2 p-2 bg-gray-100 rounded">베팅 현황: ${betStatusText}</div>`;
                } else if (match.status === 'closed') {
                    cardHTML += `
                    <div class="text-center my-4 p-3 bg-yellow-100 rounded-lg font-bold text-yellow-800">🔒 베팅 마감</div>
                    <div class="text-xs text-center mt-2 p-2 bg-gray-100 rounded">최종 현황: ${betStatusText}</div>`;
                } else {
                    const sA=Number(match.score_a), sB=Number(match.score_b), h=Number(match.handicap);
                    const adjA = sA + h;
                    let result = (adjA > sB) ? 'A' : (adjA < sB) ? 'B' : 'D';
                    cardHTML += `
                    <div class="mt-3 cursor-pointer flex justify-between items-center" onclick="toggleMatch('m-${match.id}', this.querySelector('.toggle-btn'))">
                        <span class="font-bold">${match.team_a} vs ${match.team_b}</span>
                        <span class="toggle-btn text-xs bg-gray-200 px-2 py-1 rounded">펼치기 ▼</span>
                    </div>
                    <div id="m-${match.id}" class="hidden mt-2 p-2 bg-gray-800 text-white rounded text-xs text-center">
                        스코어: ${sA}:${sB} (${result==='A'?match.team_a+'승':result==='B'?match.team_b+'승':'무승부'})
                        <div class="mt-2 text-gray-300">베팅 내역: ${betStatusText}</div>
                    </div>`;
                }
                cardHTML += `</div>`;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // [이하 함수 생략 - 기능 동일]
        function calculateLeaderboard(matches, bets) {
            const finishedMatches = matches.filter(m => m.status === 'finished');
            let misses = { '박형철': 0, '와대': 0, '손호민': 0, '최석훈': 0 };
            finishedMatches.forEach(match => {
                const adjA = Number(match.score_a) + Number(match.handicap);
                let winner = (adjA > Number(match.score_b)) ? 'A' : (adjA < Number(match.score_b)) ? 'B' : 'D';
                if(winner !== 'D') {
                    players.forEach(p => {
                        const bet = bets.find(b => b.match_id === match.id && b.player_name === p);
                        if (bet && bet.pick !== winner) misses[p]++;
                    });
                }
            });
            const sorted = Object.entries(misses).sort((a,b) => b[1]-a[1]);
            document.getElementById('leaderboard').innerHTML = sorted.map(([n, c]) => 
                `<li class="flex justify-between bg-gray-700 p-2 rounded"><span>👤 ${n}</span><span class="${c>0?'text-red-400':'text-green-400'} font-bold">${c}회 오답</span></li>`).join('');
        }

        async function placeBet(matchId, pick) {
            if (!currentUser) return alert('이름 선택 필수!');
            const { data: m } = await client.from('matches').select('status').eq('id', matchId).single();
            if(m.status !== 'open') return alert('베팅 마감됨.');
            await client.from('bets').delete().match({ match_id: matchId, player_name: currentUser });
            await client.from('bets').insert({ match_id: matchId, player_name: currentUser, pick: pick });
            loadData();
        }

        async function createMatch() {
            const tA = document.getElementById('new-teamA').value, tB = document.getElementById('new-teamB').value, h = parseFloat(document.getElementById('new-handi').value), d = document.getElementById('new-date').value;
            await client.from('matches').insert({ team_a: tA, team_b: tB, handicap: h, status: 'open', created_at: d ? new Date(d) : new Date() });
            loadData();
        }

        async function resetAllMatches() {
            if(!confirm("초기화하시겠습니까?")) return;
            await client.from('bets').delete().neq('id', 0);
            await client.from('matches').delete().neq('id', 0);
            loadData();
        }

        async function finishMatch(id) {
            const sA = document.getElementById(`scoreA-${id}`).value, sB = document.getElementById(`scoreB-${id}`).value;
            if(!sA || !sB) return alert("점수 입력 필수");
            await client.from('matches').update({ score_a: sA, score_b: sB, status: 'finished' }).match({ id: id });
            loadData();
        }
        
        async function editMatch(id, a, b, h) {
            if(!checkAuth()) return;
            const newA = prompt("팀A 수정:", a); if(!newA) return;
            const newB = prompt("팀B 수정:", b); if(!newB) return;
            const newH = prompt("핸디캡 수정:", h); if(!newH) return;
            await client.from('matches').update({ team_a: newA, team_b: newB, handicap: parseFloat(newH) }).match({ id: id });
            loadData();
        }

        async function deleteMatch(id) {
            if(!checkAuth()) return;
            if(!confirm("삭제하시겠습니까?")) return;
            await client.from('bets').delete().match({ match_id: id });
            await client.from('matches').delete().match({ id: id });
            loadData();
        }
        
        window.onload = init;
    </script>
</body>
</html>
