<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월드컵 4인 실시간 내기방</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden p-6 mb-8">
        <h1 class="text-3xl font-extrabold text-center text-blue-600 mb-2">⚽ 실시간 4인 내기방</h1>
        
        <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-200">
            <label class="block text-sm font-bold text-gray-700 mb-2">👋 나는 누구인가요? (대리 베팅 가능)</label>
            <select id="current-user" onchange="saveUser()" class="w-full border-2 border-blue-300 rounded p-3 text-lg font-bold bg-white">
                <option value="" disabled selected>이름을 선택하세요</option>
                <option value="박형철">박형철</option>
                <option value="와대">와대</option>
                <option value="손호민">손호민</option>
                <option value="최석훈">최석훈</option>
            </select>
        </div>

        <div class="bg-gray-800 p-4 rounded-lg mb-6 shadow-inner text-white">
            <h3 class="text-lg font-bold text-red-400 mb-3 border-b border-gray-600 pb-2">💸 현재 누적 벌금 (오답 횟수)</h3>
            <ul id="leaderboard" class="space-y-2 text-gray-200 text-sm md:text-base">
                <li class="text-gray-400 text-center">결과가 정산된 경기가 없습니다.</li>
            </ul>
        </div>

        <div>
            <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">📋 경기 목록 및 베팅하기</h3>
            <div id="matches-list" class="space-y-6">
                <p class="text-center text-gray-500 font-bold">데이터를 불러오는 중입니다...</p>
            </div>
        </div>
    </div>

    <div class="max-w-3xl mx-auto bg-red-50 rounded-xl shadow-lg overflow-hidden p-6 border-2 border-red-200">
        <h2 class="text-xl font-extrabold text-red-600 mb-4">👑 방장 전용 관리 메뉴</h2>
        
        <div class="bg-white p-4 rounded border mb-4">
            <h3 class="font-bold text-gray-700 mb-2">1. 새로운 경기 등록 (과거 기록 추가)</h3>
            <div class="flex flex-wrap gap-2 items-center mb-2">
                <input type="text" id="new-teamA" class="w-24 border rounded p-2 text-sm" placeholder="국가A">
                <span class="font-bold">VS</span>
                <input type="text" id="new-teamB" class="w-24 border rounded p-2 text-sm" placeholder="국가B">
                <input type="number" id="new-handi" class="w-16 border rounded p-2 text-sm" placeholder="핸디" step="0.5" value="2.5">
            </div>
            <div class="flex gap-2 items-center">
                <input type="datetime-local" id="new-date" class="border rounded p-2 text-sm text-gray-600 flex-grow" title="과거 경기일 경우 날짜를 지정하세요">
                <button onclick="createMatch()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 text-sm whitespace-nowrap">경기 열기</button>
            </div>
            <p class="text-xs text-gray-500 mt-2">* 과거 기록 추가 시 예전 날짜를 지정하세요. (비워두면 현재 시간으로 등록)</p>
        </div>

        <div class="bg-white p-4 rounded border mb-6">
            <h3 class="font-bold text-gray-700 mb-2">2. 경기 결과 입력 (정산)</h3>
            <div class="flex flex-wrap gap-2 items-center mb-2">
                <input type="number" id="finish-match-id" class="w-24 border rounded p-2" placeholder="경기번호(ID)">
                <input type="number" id="finish-scoreA" class="w-16 border rounded p-2" placeholder="A점수">
                <span class="font-bold">:</span>
                <input type="number" id="finish-scoreB" class="w-16 border rounded p-2" placeholder="B점수">
                <button onclick="finishMatch()" class="bg-gray-800 text-white px-4 py-2 rounded font-bold hover:bg-black text-sm">스코어 확정</button>
            </div>
        </div>

        <div class="bg-red-100 p-4 rounded border border-red-300">
            <h3 class="font-bold text-red-700 mb-2">⚠️ 위험 구역 (전체 기록 초기화)</h3>
            <p class="text-xs text-red-600 mb-3">모든 경기와 네 사람의 베팅 기록을 완전히 삭제하고 처음부터 다시 시작합니다.</p>
            <button onclick="resetAllMatches()" class="w-full bg-red-600 text-white px-4 py-2 rounded font-bold hover:bg-red-700 transition text-sm">모든 기록 삭제 (새로 시작)</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tdgcuozhvuyggktdjrry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkZ2N1b3podnV5Z2drdGRqcnJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzA2NTgsImV4cCI6MjA5NzIwNjY1OH0.TV08rACNlnetiWJFGYZOpFc89NSpe_52dS-Zwpuy8tU';
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const players = ['박형철', '와대', '손호민', '최석훈'];
        let currentUser = localStorage.getItem('worldcupUser') || '';

        async function init() {
            if (currentUser) document.getElementById('current-user').value = currentUser;
            await loadData();
        }

        function saveUser() {
            currentUser = document.getElementById('current-user').value;
            localStorage.setItem('worldcupUser', currentUser);
            loadData();
        }

        function formatDate(dateString) {
            const d = new Date(dateString);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `${year}.${month}.${day} ${hours}:${minutes}`;
        }

        function toggleMatch(id, btn) {
            const content = document.getElementById(id);
            if(content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                btn.innerText = '접기 ▲';
            } else {
                content.classList.add('hidden');
                btn.innerText = '펼치기 ▼';
            }
        }

        async function loadData() {
            document.getElementById('matches-list').innerHTML = '<p class="text-center text-gray-500 font-bold">데이터를 불러오는 중입니다...</p>';
            try {
                const { data: matches, error: mError } = await client.from('matches').select('*').order('created_at', { ascending: true });
                const { data: bets, error: bError } = await client.from('bets').select('*');
                
                if(mError) throw new Error(mError.message);
                if(bError) throw new Error(bError.message);

                renderMatches(matches || [], bets || []);
                calculateLeaderboard(matches || [], bets || []);
            } catch (err) {
                document.getElementById('matches-list').innerHTML = `<p class="text-center text-red-600 font-bold bg-red-100 p-4 rounded">🚨 에러 발생!<br>${err.message}</p>`;
            }
        }

        async function deleteMatch(matchId) {
            if(!confirm("이 경기를 삭제하시겠습니까? (베팅 기록도 함께 사라집니다)")) return;
            
            await client.from('bets').delete().match({ match_id: matchId });
            const { error } = await client.from('matches').delete().match({ id: matchId });
            
            if (error) alert('삭제 실패: ' + error.message);
            else loadData();
        }

        function renderMatches(matches, bets) {
            const container = document.getElementById('matches-list');
            container.innerHTML = '';

            if (matches.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 font-bold">등록된 경기가 없습니다. 방장이 추가해주세요!</p>';
                return;
            }

            matches.forEach(match => {
                const matchBets = bets.filter(b => b.match_id === match.id);
                const myBet = matchBets.find(b => b.player_name === currentUser);
                const matchDate = formatDate(match.created_at);
                
                let betStatusText = players.map(p => {
                    const b = matchBets.find(x => x.player_name === p);
                    return b ? `<span class="text-blue-600 font-bold">${p}(O)</span>` : `<span class="text-gray-400">${p}(X)</span>`;
                }).join(' / ');

                let cardHTML = `
                <div class="border-2 ${match.status === 'finished' ? 'border-gray-300 bg-gray-100' : 'border-blue-300 bg-white'} rounded-xl p-5 relative shadow-sm mb-4">
                    <span class="absolute -top-3 left-4 bg-gray-700 text-white px-2 py-1 rounded text-xs shadow">ID: ${match.id}</span>
                    <div class="absolute top-2 right-4 flex gap-2 items-center">
                        <span class="text-xs text-gray-400 font-medium">${matchDate}</span>
                        <button onclick="deleteMatch(${match.id})" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200">🗑️ 삭제</button>
                    </div>
                `;

                if (match.status === 'open') {
                    cardHTML += `
                    <div class="text-center mb-4 mt-2">
                        <span class="text-xl font-black text-gray-800">${match.team_a}</span>
                        <span class="text-gray-400 font-bold mx-2">VS</span>
                        <span class="text-xl font-black text-gray-800">${match.team_b}</span>
                        <p class="text-sm text-blue-600 font-bold mt-1">핸디캡: 팀A ${Number(match.handicap) > 0 ? '+'+Number(match.handicap) : Number(match.handicap)}</p>
                    </div>
                    <div class="flex gap-2 mb-3">
                        <button onclick="placeBet(${match.id}, 'A')" class="${myBet?.pick === 'A' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700'} w-1/2 py-2 rounded font-bold hover:bg-blue-500 hover:text-white transition">${match.team_a} 승</button>
                        <button onclick="placeBet(${match.id}, 'B')" class="${myBet?.pick === 'B' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-700'} w-1/2 py-2 rounded font-bold hover:bg-red-500 hover:text-white transition">${match.team_b} 승</button>
                    </div>
                    <div class="text-xs text-center mt-2 p-2 bg-gray-100 rounded">베팅 현황: ${betStatusText}</div>
                    `;
                } else if (match.status === 'finished') {
                    const sA = Number(match.score_a);
                    const sB = Number(match.score_b);
                    const h = Number(match.handicap);
                    
                    const adjustedA = sA + h;
                    const winnerResult = adjustedA > sB ? 'A' : 'B';
                    const winnerText = winnerResult === 'A' ? `${match.team_a} 승리` : `${match.team_b} 승리`;
                    
                    const losers = matchBets.filter(b => b.pick !== winnerResult).map(b => b.player_name);
                    
                    cardHTML += `
                    <div class="mt-3 cursor-pointer flex justify-between items-center" onclick="toggleMatch('match-content-${match.id}', this.querySelector('.toggle-btn'))">
                        <div class="text-left w-3/4 truncate">
                            <span class="font-bold text-gray-700">${match.team_a} vs ${match.team_b}</span>
                            <span class="text-xs bg-gray-300 text-gray-800 px-2 py-1 rounded ml-2 font-bold">[${winnerText}]</span>
                        </div>
                        <span class="toggle-btn text-gray-500 text-xs border border-gray-300 bg-white px-2 py-1 rounded hover:bg-gray-200 font-bold">펼치기 ▼</span>
                    </div>

                    <div id="match-content-${match.id}" class="hidden mt-4 pt-4 border-t border-gray-300">
                        <div class="text-center mb-4">
                            <span class="text-xl font-black text-gray-800">${match.team_a}</span>
                            <span class="text-gray-400 font-bold mx-2">VS</span>
                            <span class="text-xl font-black text-gray-800">${match.team_b}</span>
                            <p class="text-sm text-blue-600 font-bold mt-1">핸디캡: 팀A ${h > 0 ? '+'+h : h}</p>
                        </div>
                        <div class="bg-gray-800 text-white p-3 rounded text-sm mt-2 text-center">
                            <p class="mb-1 text-gray-300">실제 스코어 <span class="font-bold text-white">${sA} : ${sB}</span></p>
                            <p class="font-bold text-yellow-400 mb-2">핸디캡 적용 결과: [${winnerText}]</p>
                            <p class="text-red-400">❌ 오답(벌금): ${losers.length > 0 ? losers.join(', ') : '틀린 사람 없음!'}</p>
                        </div>
                        <div class="text-xs text-center mt-2">나의 픽: ${myBet ? (myBet.pick === 'A' ? match.team_a : match.team_b) : '베팅 안함'}</div>
                    </div>
                    `;
                }

                cardHTML += `</div>`;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function calculateLeaderboard(matches, bets) {
            const finishedMatches = matches.filter(m => m.status === 'finished');
            
            if(finishedMatches.length === 0) {
                document.getElementById('leaderboard').innerHTML = '<li class="text-gray-400 text-center">결과가 정산된 경기가 없습니다.</li>';
                return;
            }

            let misses = { '박형철': 0, '와대': 0, '손호민': 0, '최석훈': 0 };

            finishedMatches.forEach(match => {
                const sA = Number(match.score_a);
                const sB = Number(match.score_b);
                const h = Number(match.handicap);
                const adjustedA = sA + h;
                const winnerResult = adjustedA > sB ? 'A' : 'B';
                
                players.forEach(p => {
                    const bet = bets.find(b => b.match_id === match.id && b.player_name === p);
                    if (bet && bet.pick !== winnerResult) misses[p]++;
                });
            });

            const sorted = Object.entries(misses).sort((a, b) => b[1] - a[1]);
            document.getElementById('leaderboard').innerHTML = sorted.map(([name, count]) => 
                count > 0 
                ? `<li class="flex justify-between bg-gray-700 p-2 rounded"><span>👤 ${name}</span><span class="text-red-400 font-bold">${count}회 오답 💸</span></li>`
                : `<li class="flex justify-between bg-gray-700 p-2 rounded opacity-50"><span>👤 ${name}</span><span class="text-green-400">전부 적중! 🎉</span></li>`
            ).join('');
        }

        async function placeBet(matchId, pick) {
